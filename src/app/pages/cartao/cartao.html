<div class="flex items-center justify-center min-h-screen bg-zinc-900 overflow-hidden">

  <div
    class="relative cursor-pointer perspective transition-all duration-700"

    (click)="flipCard()"

    [class.w-[340px]]="!isBack"
    [class.h-[520px]]="!isBack"

    [class.w-screen]="isBack"
    [class.h-screen]="isBack"
  >

    <div
      class="relative w-full h-full duration-700 transform-style preserve-3d"
      [class.rotate-y-180]="isBack"
    >

      <!-- FRONT -->
      <div
        class="absolute inset-0 rounded-3xl overflow-hidden backface-hidden
               shadow-[0_0_80px_rgba(16,185,129,0.12)]
               border border-white/10
               bg-gradient-to-br from-purple-950  to-violet-400
               p-7 flex flex-col"
      >

        <!-- BG FX -->


        <div
          class="absolute bottom-0 right-0 w-72 h-72
                 bg-violet-400/20 blur-3xl rounded-full"
        ></div>

        <div
          class="absolute inset-0
                 bg-[radial-gradient(circle_at_top_right,rgba(16,185,129,0.15),transparent_35%)]"
        ></div>

        <div class="absolute inset-0 backdrop-blur-[1px]"></div>

        <!-- CONTENT -->
        <div class="relative z-10 flex flex-col h-full">

          <!-- TOP -->
          <div class="flex items-start justify-between">

            <!-- LOGO -->
            <div class="relative">

              <div
                class="absolute inset-0 blur-3xl bg-emerald-400/20
                       rounded-full scale-145"
              ></div>

              <img
                src="/assets/logotipo.png"
                class="relative w-62 drop-shadow-2xl"
              />

            </div>

          </div>

          <!-- CENTER -->
          <div class="flex-1 flex flex-col justify-center">

            <div class="space-y-3">

              <div
                class="inline-flex items-center gap-2
                       px-3 py-1 rounded-full
                       bg-white/10 border border-white/10
                       backdrop-blur-md"
              >

                <span class="h-2 w-2 rounded-full bg-emerald-500 montserrat"></span>
                <span class="text-white/70 text-xs tracking-wide uppercase">

                  CRP 06/61283
                </span>
              </div>

              <div class="space-y-1">

                <h2
                  class="text-white text-[34px]
                         leading-[1.05]
                         font-bold tracking-tight
                         montserrat"
                >
                  Verônica C. Almeida
                </h2>

                <h4 class="text-white/70 text- font-normal montserrat">
                  Psicóloga e Neuropsicóloga
                </h4>

              </div>

            </div>

          </div>

          <!-- FOOTER -->
          <div class="flex items-end justify-between gap-4">

            <div>

              <p
                class="text-white/40 text-[11px]
                        tracking-[0.3em] montserrat"
              >
                CEO da Clínica Claramente
              </p>

              <p class="text-white/60 text-xs mt-1 montserrat">
                Toque para interagir
              </p>

            </div>

            <div>
              <ng-icon name="lucideNfc" style="width: 24px; height: 24px; color: white" />
            </div>

          </div>

        </div>

      </div>

      <!-- BACK -->

      <div
        class="absolute inset-0 bg-gradient-to-b from-purple-800  to-violet-200 rotate-y-180 backface-hidden flex flex-col overflow-auto">


        <!-- HEADER -->
        <div class="space-y-2 border-b border-zinc-200/10 text-center p-12">

          <div
            class="inline-flex items-center gap-2
                    px-3 py-1 rounded-full
                    border border-zinc-200
                    backdrop-blur-md"
          >

            <span class="h-2 w-2 rounded-full bg-emerald-500 montserrat"></span>
            <span class="text-zinc-200 text-xs tracking-wide uppercase">

              CRP 06/61283
            </span>
          </div>
          <h2 class="text-white text-4xl font-bold cormorant">
            Verônica C. Almeida
          </h2>

          <p class="text-zinc-600 montserrat text-sm">
            Psicóloga e Neuropsicóloga
          </p>

        </div>

        <!-- CONTENT -->
        <div class="flex-1 p-6 flex flex-col items-center">

          <!-- QR -->
          <div class="bg-white p-5 rounded-3xl shadow-xl mt-8">
            <img
              src="/assets/qrcode.png"
              class="w-64"
            />
          </div>

          <!-- INFO -->
          <div class="w-full max-w-xl mt-10 space-y-4">

            <div class="bg-white rounded-2xl p-5 shadow">

              <p class="text-zinc-400 text-xs uppercase">
                Nome
              </p>

              <p class="text-zinc-800 font-bold text-lg">
                Verônica C. Almeida
              </p>

            </div>

            <div class="grid grid-cols-2 gap-4">

              <div class="bg-white rounded-2xl p-5 shadow">

                <p class="text-zinc-400 text-xs uppercase">
                  Matrícula
                </p>

                <p class="font-bold text-zinc-800">
                  #847291
                </p>

              </div>

              <div class="bg-white rounded-2xl p-5 shadow">

                <p class="text-zinc-400 text-xs uppercase">
                  Validade
                </p>

                <p class="font-bold text-zinc-800">
                  12/2026
                </p>

              </div>

            </div>

            <div class="bg-white rounded-2xl p-5 shadow">

              <p class="text-zinc-400 text-xs uppercase">
                Setor
              </p>

              <p class="font-bold text-zinc-800">
                Tecnologia da Informação
              </p>

            </div>

          </div>

        </div>

      </div>

    </div>

  </div>

</div>
